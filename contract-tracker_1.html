<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>契約書 進捗管理</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f4f8; color: #334155; font-family: 'M PLUS Rounded 1c', sans-serif; min-height: 100vh; }
  button { transition: all 0.15s; cursor: pointer; font-family: 'M PLUS Rounded 1c', sans-serif; }
  button:hover { opacity: 0.8; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  input, select, textarea { font-family: 'M PLUS Rounded 1c', sans-serif; }
  #header { background: #fff; border-bottom: 1px solid #e2eaf0; padding: 14px 20px; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 6px #0001; }
  #header-inner { max-width: 720px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-size: 18px; font-weight: 800; color: #2d4059; letter-spacing: 0.5px; }
  #header-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }
  #header-btns { display: flex; gap: 8px; }
  #main { max-width: 720px; margin: 0 auto; padding: 16px 14px 80px; }
  .error-bar { background: #fde8e8; border: 1px solid #fca5a5; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; color: #e05555; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
  #filter-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 10px; }
  #sort-row { display: flex; gap: 6px; margin-bottom: 14px; align-items: center; }
  .sort-label { font-size: 11px; color: #b0bec5; font-weight: 700; }
  .pill-btn { flex-shrink: 0; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1.5px solid #dde5ec; background: #fff; color: #90a4ae; }
  .sort-btn { padding: 4px 10px; border-radius: 7px; font-size: 11px; font-weight: 700; border: 1.5px solid #dde5ec; background: #fff; color: #b0bec5; }
  .sort-btn.active { border-color: #4a90d9; background: #e8f1fb; color: #4a90d9; }
  #cases { display: flex; flex-direction: column; gap: 10px; }
  .case-card { background: #fff; border: 1.5px solid #e2eaf0; border-radius: 16px; padding: 16px; box-shadow: 0 1px 4px #0001; }
  .case-card.done { background: #f4fbf7; border-color: #a8dfc4; }
  .case-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .case-name { font-size: 15px; font-weight: 700; color: #2d4059; margin-bottom: 2px; }
  .case-name.done { color: #90a4ae; text-decoration: line-through; }
  .case-partner { font-size: 12px; color: #90a4ae; }
  .deadline-badge { font-size: 11px; padding: 2px 8px; border-radius: 5px; font-family: 'DM Mono', monospace; font-weight: 600; white-space: nowrap; }
  .progress-wrap { margin: 6px 0 4px; }
  .progress-bar-bg { height: 5px; background: #e8eef3; border-radius: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; }
  .progress-dots { display: flex; justify-content: space-between; margin-top: 5px; }
  .progress-dot { width: 8px; height: 8px; border-radius: 50%; }
  .case-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .status-pill { font-size: 11px; padding: 3px 11px; border-radius: 20px; font-weight: 700; white-space: nowrap; border: 1px solid; }
  .case-actions { display: flex; gap: 6px; }
  .btn-next { padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; border: 1.5px solid; }
  .btn-edit { padding: 5px 10px; border-radius: 8px; font-size: 12px; border: 1.5px solid #dde5ec; background: #f8fafc; color: #78909c; }
  .btn-del  { padding: 5px 10px; border-radius: 8px; font-size: 12px; border: 1.5px solid #fcd4d4; background: #fff5f5; color: #e07070; }
  .case-memo { margin-top: 10px; font-size: 12px; color: #90a4ae; border-top: 1px solid #eef2f6; padding-top: 8px; }
  .empty { text-align: center; color: #c4d0da; padding: 64px 0; font-size: 14px; }
  .loading { text-align: center; color: #b0bec5; padding: 60px 0; font-size: 14px; }
  #modal-overlay { display: none; position: fixed; inset: 0; background: #0000004a; z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  #modal-overlay.open { display: flex; }
  #modal-box { background: #fff; border-radius: 18px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px #0002; }
  #modal-title { font-size: 16px; font-weight: 700; color: #334155; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: #90a4ae; margin-bottom: 4px; font-weight: 700; letter-spacing: 0.8px; }
  .field input, .field select, .field textarea { width: 100%; background: #f8fafc; border: 1.5px solid #dde5ec; border-radius: 9px; padding: 9px 12px; color: #334155; font-size: 14px; outline: none; }
  .field textarea { resize: vertical; }
  #modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  #btn-cancel { flex: 1; padding: 10px; border-radius: 9px; border: 1.5px solid #dde5ec; background: #f8fafc; color: #90a4ae; font-size: 14px; }
  #btn-save   { flex: 2; padding: 10px; border-radius: 9px; border: none; background: #4a90d9; color: #fff; font-size: 14px; font-weight: 700; }
  .btn-primary { background: #4a90d9; color: #fff; border: none; border-radius: 12px; padding: 9px 20px; font-size: 14px; font-weight: 700; }
  .btn-refresh { background: #f0f4f8; color: #78909c; border: 1.5px solid #dde5ec; border-radius: 10px; padding: 8px 12px; font-size: 13px; font-weight: 700; }
</style>
</head>
<body>
<div id="header">
  <div id="header-inner">
    <div>
      <h1>📋 契約書 進捗管理</h1>
      <div id="header-sub">読み込み中…</div>
    </div>
    <div id="header-btns">
      <button class="btn-refresh" onclick="loadCases()">↺</button>
      <button class="btn-primary" onclick="openModal()">＋ 追加</button>
    </div>
  </div>
</div>
<div id="main">
  <div id="error-area"></div>
  <div id="filter-row"></div>
  <div id="sort-row">
    <span class="sort-label">並び替え</span>
    <button class="sort-btn active" data-sort="deadline" onclick="setSort('deadline')">締切日順</button>
    <button class="sort-btn" data-sort="status" onclick="setSort('status')">進捗順</button>
    <button class="sort-btn" data-sort="new" onclick="setSort('new')">新着順</button>
  </div>
  <div id="cases"><div class="loading">⏳ 読み込み中…</div></div>
</div>
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">📄 案件を追加</div>
    <div class="field"><label>案件名</label><input id="f-name" type="text" placeholder="例：〇〇業務委託契約"></div>
    <div class="field"><label>相手先</label><input id="f-partner" type="text" placeholder="例：株式会社△△"></div>
    <div class="field"><label>締切日</label><input id="f-deadline" type="date"></div>
    <div class="field"><label>ステータス</label>
      <select id="f-status">
        <option value="received">依頼受付</option>
        <option value="drafting">ドラフト作成中</option>
        <option value="internal">社内確認中</option>
        <option value="client">先方確認中</option>
        <option value="printing">印刷・製本</option>
        <option value="done">締結完了</option>
      </select>
    </div>
    <div class="field"><label>メモ</label><textarea id="f-memo" rows="2" placeholder="備考など"></textarea></div>
    <div id="modal-btns">
      <button id="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button id="btn-save" onclick="saveCase()">保存する</button>
    </div>
  </div>
</div>
<script>
var GAS_URL = "https://script.google.com/macros/s/AKfycbwhdvGYQUWJGjtEG0T05XAwtK_fiRDb6lMXmZqUrQX0hL0cU-uaH5o1_ZKy24tYndsX/exec";
var STATUSES = [
  { id: "received", label: "依頼受付",      color: "#78909c", short: "受付" },
  { id: "drafting", label: "ドラフト作成中", color: "#f59e0b", short: "作成" },
  { id: "internal", label: "社内確認中",     color: "#4a90d9", short: "社内" },
  { id: "client",   label: "先方確認中",     color: "#9b79d8", short: "先方" },
  { id: "printing", label: "印刷・製本",     color: "#e87d9a", short: "印刷" },
  { id: "done",     label: "締結完了",       color: "#4caf82", short: "完了" }
];
var STATUS_INDEX = {};
for (var si = 0; si < STATUSES.length; si++) STATUS_INDEX[STATUSES[si].id] = si;

var cases = [];
var currentFilter = "all";
var currentSort = "deadline";
var editingId = null;

function today() { return new Date().toISOString().split("T")[0]; }

function daysLeft(d) {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date(today())) / 86400000);
}

function gasCall(params, cb) {
  var cbName = "_cb" + Date.now() + Math.floor(Math.random()*10000);
  var parts = [];
  for (var k in params) {
    var v = params[k];
    if (typeof v === "object") v = JSON.stringify(v);
    parts.push(encodeURIComponent(k) + "=" + encodeURIComponent(v));
  }
  parts.push("callback=" + cbName);
  var url = GAS_URL + "?" + parts.join("&");

  window[cbName] = function(data) {
    try { document.body.removeChild(document.getElementById(cbName)); } catch(e){}
    delete window[cbName];
    cb(null, data);
  };

  var script = document.createElement("script");
  script.id = cbName;
  script.src = url;
  script.onerror = function() {
    try { document.body.removeChild(script); } catch(e){}
    delete window[cbName];
    cb(new Error("通信エラー"));
  };
  document.body.appendChild(script);
}

function showError(msg) {
  var area = document.getElementById("error-area");
  if (!msg) { area.innerHTML = ""; return; }
  area.innerHTML = '<div class="error-bar">⚠️ ' + msg + '<button onclick="showError(null)" style="background:none;border:none;color:#e05555;font-size:16px;cursor:pointer;">×</button></div>';
}

function loadCases() {
  document.getElementById("cases").innerHTML = '<div class="loading">⏳ 読み込み中…</div>';
  showError(null);
  gasCall({ action: "getAll" }, function(err, data) {
    if (err || !data || !data.ok) {
      showError("読み込みに失敗しました");
      document.getElementById("cases").innerHTML = "";
      return;
    }
    cases = data.data || [];
    renderAll();
  });
}

function renderAll() {
  document.getElementById("header-sub").textContent = "全" + cases.length + "件 ／ Googleスプレッドシート連携";
  renderFilters();
  renderCases();
}

function renderFilters() {
  var counts = {};
  for (var i = 0; i < STATUSES.length; i++) {
    var sid = STATUSES[i].id;
    counts[sid] = cases.filter(function(c){ return c.status === sid; }).length;
  }
  var html = '<button class="pill-btn" style="' + (currentFilter==="all" ? "border-color:#4a90d9;background:#e8f1fb;color:#4a90d9;" : "") + '" onclick="setFilter(\'all\')">すべて (' + cases.length + ')</button>';
  for (var j = 0; j < STATUSES.length; j++) {
    var s = STATUSES[j];
    var active = currentFilter === s.id;
    html += '<button class="pill-btn" style="' + (active ? "border-color:"+s.color+";background:"+s.color+"18;color:"+s.color+";" : "") + '" onclick="setFilter(\''+s.id+'\')">' + s.short + ' (' + (counts[s.id]||0) + ')</button>';
  }
  document.getElementById("filter-row").innerHTML = html;
}

function setFilter(f) { currentFilter = f; renderAll(); }

function setSort(s) {
  currentSort = s;
  var btns = document.querySelectorAll(".sort-btn");
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle("active", btns[i].dataset.sort === s);
  }
  renderCases();
}

function renderCases() {
  var filtered = currentFilter === "all" ? cases.slice() : cases.filter(function(c){ return c.status === currentFilter; });
  filtered.sort(function(a, b) {
    if (currentSort === "deadline") {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1; if (!b.deadline) return -1;
      return a.deadline > b.deadline ? 1 : -1;
    }
    if (currentSort === "status") return (STATUS_INDEX[a.status]||0) - (STATUS_INDEX[b.status]||0);
    return String(b.id) > String(a.id) ? 1 : -1;
  });

  if (filtered.length === 0) {
    document.getElementById("cases").innerHTML = '<div class="empty"><div style="font-size:40px;margin-bottom:12px">📄</div>案件がありません</div>';
    return;
  }

  var html = "";
  for (var i = 0; i < filtered.length; i++) {
    var c = filtered[i];
    var s = STATUSES[0];
    for (var j = 0; j < STATUSES.length; j++) { if (STATUSES[j].id === c.status) { s = STATUSES[j]; break; } }
    var isDone = c.status === "done";
    var idx = STATUS_INDEX[c.status] || 0;
    var pct = Math.round(idx / (STATUSES.length - 1) * 100);
    var d = daysLeft(c.deadline);
    var dbg = "#f1f5f8", dcol = "#90a4ae";
    if (d !== null) {
      if (d < 0) { dbg="#fde8e8"; dcol="#e05555"; }
      else if (d <= 3) { dbg="#fff0e0"; dcol="#d97706"; }
      else if (d <= 7) { dbg="#fffbe6"; dcol="#b49000"; }
    }
    var dlabel = d === null ? "" : d < 0 ? (Math.abs(d)+"日超過") : d === 0 ? "本日締切" : ("残"+d+"日");
    var dots = "";
    for (var k = 0; k < STATUSES.length; k++) {
      var st = STATUSES[k];
      dots += '<div class="progress-dot" style="background:' + (k<=idx?st.color:"#dde5ec") + ';border:1.5px solid ' + (k<=idx?st.color:"#c8d4dc") + '"></div>';
    }
    html += '<div class="case-card' + (isDone?" done":"") + '">';
    html += '<div class="case-top"><div>';
    html += '<div class="case-name' + (isDone?" done":"") + '">' + esc(c.name) + '</div>';
    if (c.partner) html += '<div class="case-partner">' + esc(c.partner) + '</div>';
    html += '</div>';
    if (c.deadline) html += '<span class="deadline-badge" style="background:'+dbg+';color:'+dcol+';border:1px solid '+dcol+'33">'+dlabel+'</span>';
    html += '</div>';
    html += '<div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div><div class="progress-dots">'+dots+'</div></div>';
    html += '<div class="case-bottom"><span class="status-pill" style="background:'+s.color+'18;color:'+s.color+';border-color:'+s.color+'55">'+s.label+'</span>';
    html += '<div class="case-actions">';
    if (!isDone) html += '<button class="btn-next" style="border-color:'+s.color+'55;background:'+s.color+'15;color:'+s.color+'" onclick="advanceStatus(\''+c.id+'\')">次へ →</button>';
    html += '<button class="btn-edit" onclick="openModal(\''+c.id+'\')">編集</button>';
    html += '<button class="btn-del" onclick="deleteCase(\''+c.id+'\')">削除</button>';
    html += '</div></div>';
    if (c.memo) html += '<div class="case-memo">💬 ' + esc(c.memo) + '</div>';
    html += '</div>';
  }
  document.getElementById("cases").innerHTML = html;
}

function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function openModal(id) {
  editingId = id || null;
  var c = id ? null : null;
  for (var i = 0; i < cases.length; i++) { if (cases[i].id == id) { c = cases[i]; break; } }
  document.getElementById("modal-title").textContent = c ? "✏️ 案件を編集" : "📄 案件を追加";
  document.getElementById("f-name").value = c ? c.name : "";
  document.getElementById("f-partner").value = c ? c.partner : "";
  document.getElementById("f-deadline").value = c ? c.deadline : "";
  document.getElementById("f-status").value = c ? c.status : "received";
  document.getElementById("f-memo").value = c ? c.memo : "";
  document.getElementById("modal-overlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  editingId = null;
}

function saveCase() {
  var name = document.getElementById("f-name").value.trim();
  if (!name) { alert("案件名を入力してください"); return; }
  var c = {
    id: editingId || String(Date.now()),
    name: name,
    partner: document.getElementById("f-partner").value.trim(),
    deadline: document.getElementById("f-deadline").value,
    status: document.getElementById("f-status").value,
    memo: document.getElementById("f-memo").value.trim()
  };
  document.getElementById("btn-save").textContent = "保存中…";
  document.getElementById("btn-save").disabled = true;
  gasCall({ action: "save", case: c }, function(err, data) {
    document.getElementById("btn-save").textContent = "保存する";
    document.getElementById("btn-save").disabled = false;
    if (err || !data || !data.ok) { showError("保存に失敗しました"); return; }
    closeModal();
    loadCases();
  });
}

function deleteCase(id) {
  if (!confirm("この案件を削除しますか？")) return;
  gasCall({ action: "delete", id: id }, function(err, data) {
    if (err || !data || !data.ok) { showError("削除に失敗しました"); return; }
    loadCases();
  });
}

function advanceStatus(id) {
  var c = null;
  for (var i = 0; i < cases.length; i++) { if (cases[i].id == id) { c = cases[i]; break; } }
  if (!c) return;
  var idx = STATUS_INDEX[c.status] || 0;
  var nextIdx = Math.min(idx + 1, STATUSES.length - 1);
  var updated = { id: c.id, name: c.name, partner: c.partner, deadline: c.deadline, status: STATUSES[nextIdx].id, memo: c.memo };
  gasCall({ action: "save", case: updated }, function(err, data) {
    if (err || !data || !data.ok) { showError("更新に失敗しました"); return; }
    loadCases();
  });
}

loadCases();
</script>
</body>
</html>
